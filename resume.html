<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maricel Micó, currículo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            }

               
        .hero-section {
            position: relative;
            width: 100%;
            height: calc(100vh - 56px - 40px);
            padding-top: 20px;
            background-color: #05696B;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Opcional: overlay para mejor legibilidad */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #3c9d9f ;
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            margin-top: 40px; /* baja la imagen */
        }
        
        img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                    }

        .footer {
            height: 40px;          /* footer más pequeño */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #212529; /* mismo tono navbar */
            color: white;
            font-size: 0.9rem;
            margin: 0;
            padding: 0;
                }
        .footer p {
            margin: 0;
                }
    </style>
</head>
<body>
    <!-- Navbar Bootstrap con tu menú -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bolder" href="index.html">Maricel Micó </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="resume.html">Currículo</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sección hero con imagen -->
    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <!--imagen aquí -->
            <img src="curriculo.png" alt="curriculo" class="img-fluid">
        </div>
    </section>
      <div class="footer">
         <p>© 2026 Maricel Mico</p>
        </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
