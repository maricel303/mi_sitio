<section class="py-5">
    <div class="container-fluid px-0">

               <div class="bg-light rounded-0 py-5 px-3 px-md-5">

            <div class="text-center mb-5">
                <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3">
                    <i class="bi bi-envelope"></i>
                </div>

                <h1 class="fw-bolder">Contáctenos</h1>
                <p class="lead fw-normal text-muted mb-0">
                    Trabajemos juntos
                </p>
            </div>

            <div class="row justify-content-center">
                <div class="col-12">

                    <form action="https://formspree.io/f/xgoddzgl"
                          method="POST"
                          id="contactForm">

                        <!-- Nombre -->
                        <div class="form-floating mb-3">
                            <input class="form-control"
                                   id="nombre"
                                   name="nombre"
                                   type="text"
                                   placeholder="Escriba su nombre..."
                                   required />

                            <label for="nombre">
                                Nombre completo
                            </label>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input class="form-control"
                                   id="email"
                                   name="email"
                                   type="email"
                                   placeholder="tu@email.com"
                                   required />

                            <label for="email">
                                Correo electrónico
                            </label>
                        </div>

                        <!-- Mensaje -->
                        <div class="form-floating mb-3">
                            <textarea class="form-control"
                                      id="mensaje"
                                      name="mensaje"
                                      style="height: 250px"
                                      placeholder="Escriba su mensaje aquí..."
                                      required></textarea>

                            <label for="mensaje">
                                Mensaje
                            </label>
                        </div>

                        <!-- Campos ocultos -->
                        <input type="hidden"
                               name="_subject"
                               value="Nuevo mensaje de tu web" />

                        <input type="hidden"
                               name="_next"
                               value="https://maricel303.github.io/mi_sitio/"/>

                        <!-- Botón -->
                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg"
                                    type="submit">
                                Enviar mensaje
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</section>
